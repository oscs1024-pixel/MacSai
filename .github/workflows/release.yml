name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    name: Build & Release DMG
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Check if release exists
        id: check
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if gh release view "$TAG" &>/dev/null; then
            EXISTING_SHA=$(gh release view "$TAG" --json targetCommitish -q '.targetCommitish')
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release $TAG exists (commit: $EXISTING_SHA)"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Release $TAG does not exist yet"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build release binary
        run: swift build -c release

      - name: Run tests
        run: swift run MacCleanTestRunner

      - name: Build DMG
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          bash scripts/build-dmg.sh
          ls -la .build/MacClean-${VERSION}.dmg

      - name: Delete existing release (same version)
        if: steps.check.outputs.exists == 'true'
        run: gh release delete "${{ steps.version.outputs.tag }}" --yes --cleanup-tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"

          gh release create "$TAG" \
            ".build/MacClean-${VERSION}.dmg" \
            --title "Mac Clean $TAG" \
            --generate-notes \
            --notes-start-tag "$(git tag --sort=-creatordate | head -1 || echo '')" \
            --notes "$(cat <<EOF
          ## Mac Clean $TAG

          ### Install via Homebrew

          \`\`\`
          brew tap iliyami/macclean
          brew install --cask mac-clean
          \`\`\`

          ### Or download directly

          Download **MacClean-${VERSION}.dmg**, open it, and drag Mac Clean to your Applications folder.

          ### Requirements
          - macOS 14 (Sonoma) or later
          - Grant Full Disk Access in System Settings for complete scan results

          ### Safety
          All deletions go to Trash by default. Protected system paths are blocklisted. Every operation is logged.
          EOF
          )"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew Cask in main repo
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA256=$(shasum -a 256 ".build/MacClean-${VERSION}.dmg" | awk '{print $1}')
          echo "DMG SHA256: $SHA256"

          sed -i '' "s/version \".*\"/version \"${VERSION}\"/" Casks/mac-clean.rb
          sed -i '' "s/sha256 \".*\"/sha256 \"${SHA256}\"/" Casks/mac-clean.rb

          echo "Updated cask formula:"
          head -5 Casks/mac-clean.rb

          if ! git diff --quiet Casks/mac-clean.rb; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add Casks/mac-clean.rb
            git commit -m "Update Homebrew Cask to v${VERSION}"
            git push origin main
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync cask to homebrew-macclean tap (if exists)
        continue-on-error: true
        run: |
          REPO_OWNER="${{ github.repository_owner }}"
          TAP="${REPO_OWNER}/homebrew-macclean"
          CASK_PATH="Casks/mac-clean.rb"
          VERSION="${{ steps.version.outputs.version }}"

          if ! gh repo view "${TAP}" &>/dev/null; then
            echo "Tap ${TAP} does not exist yet. Skipping sync."
            echo "Create it once with: bash scripts/setup-homebrew-tap.sh"
            exit 0
          fi

          # Fetch existing file SHA (needed for update API call)
          EXISTING_SHA=$(gh api "repos/${TAP}/contents/${CASK_PATH}" --jq '.sha' 2>/dev/null || echo "")

          # New content base64-encoded
          NEW_CONTENT=$(base64 -i Casks/mac-clean.rb)

          # Compare with existing content
          EXISTING_CONTENT=""
          if [ -n "$EXISTING_SHA" ]; then
            EXISTING_CONTENT=$(gh api "repos/${TAP}/contents/${CASK_PATH}" --jq '.content' | tr -d '\n')
          fi

          if [ "$NEW_CONTENT" = "$EXISTING_CONTENT" ]; then
            echo "Cask already up to date in ${TAP}"
            exit 0
          fi

          # Push via Contents API (works cross-repo with PAT)
          ARGS=(
            "repos/${TAP}/contents/${CASK_PATH}"
            -X PUT
            -f "message=Update Mac Clean cask to v${VERSION}"
            -f "content=${NEW_CONTENT}"
            -f "committer[name]=github-actions[bot]"
            -f "committer[email]=github-actions[bot]@users.noreply.github.com"
          )
          if [ -n "$EXISTING_SHA" ]; then
            ARGS+=(-f "sha=${EXISTING_SHA}")
          fi

          gh api "${ARGS[@]}" >/dev/null
          echo "Cask synced to ${TAP}"
        env:
          GH_TOKEN: ${{ secrets.TAP_PUSH_TOKEN || secrets.GITHUB_TOKEN }}
